<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2026年05月26日(火) のサマリー｜📰 朝のニュースサマリー</title>
  <style>
    :root {
      --bg:        #faf9f6;
      --surface:   #ffffff;
      --border:    #e3e0d8;
      --text:      #1f2328;
      --text-soft: #5a626c;
      --accent:    #2f5d8a;
      --accent-bg: #eaf0f6;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:        #16181c;
        --surface:   #1e2126;
        --border:    #2c3036;
        --text:      #e6e8ea;
        --text-soft: #9aa1aa;
        --accent:    #7fa9d4;
        --accent-bg: #1f2730;
      }
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN",
                   "Hiragino Sans", "Yu Gothic", "Meiryo", "Helvetica Neue", Arial, sans-serif;
      line-height: 1.75;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 720px; margin: 0 auto; padding: 2rem 1.15rem 4rem; }
    .back {
      display: inline-block;
      margin-bottom: 1.5rem;
      color: var(--accent);
      text-decoration: none;
      font-size: .9rem;
    }
    .back:hover { text-decoration: underline; }
    .date-iso {
      font-family: "SFMono-Regular", "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
      font-size: .82rem;
      color: var(--text-soft);
      background: var(--accent-bg);
      padding: .15rem .5rem;
      border-radius: 5px;
    }
    h1 {
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "YuMincho", Georgia, "Times New Roman", serif;
      font-size: 1.55rem;
      margin: .8rem 0 1.5rem;
      overflow-wrap: anywhere;
    }
    .placeholder {
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 2rem 1.25rem;
      text-align: center;
      color: var(--text-soft);
    }
    @media (max-width: 480px) {
      .wrap { padding: 1.5rem 1rem 3rem; }
      h1 { font-size: 1.35rem; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="../">← 一覧へ戻る</a>
    <p><span class="date-iso">2026-05-26</span></p>
    <h1>2026年05月26日(火) のサマリー</h1>
    <div class="placeholder">
      <p>最初のサマリーはまだありません。</p>
      <p>このページは後日、その日の一般ニュースサマリーに差し替えられます。</p>
    </div>
  </div>
</body>
</html>
